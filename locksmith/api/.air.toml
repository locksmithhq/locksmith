root = "."
tmp_dir = "dev"

[build]
cmd = "go mod tidy && go build -o ./dev/main ./cmd"
bin = "dev/main"
full_bin = "APP_ENV=dev APP_USER=air ./dev/main serve"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["assets", "dev", "vendor", "frontend/node_modules", "tests", "adapter/http/rest/docs"]
include_dir = []
exclude_file = []
exclude_regex = []
exclude_unchanged = true
follow_symlink = true
log = "air.log"
delay = 1000
stop_on_error = true
send_interrupt = false
kill_delay = 500

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true